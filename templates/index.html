<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام شاهين الذكي</title>
    <style>
        body { background-color: #001f3f; color: #f5f5f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; border: 2px solid #d4af37; padding: 40px; border-radius: 20px; background: rgba(0, 31, 63, 0.8); box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 500px; }
        h1 { color: #d4af37; margin-bottom: 20px; }
        #chat-box { height: 200px; overflow-y: auto; border: 1px solid #d4af37; margin-bottom: 20px; padding: 10px; border-radius: 10px; text-align: right; background: #002b56; }
        input { width: 80%; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #d4af37; color: #001f3f; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦅 نظام شاهين الذكي</h1>
        <div id="chat-box">أهلاً بك يا مستشار محمد، كيف يمكنني مساعدتك اليوم؟</div>
        <input type="text" id="user-input" placeholder="اكتب رسالتك هنا...">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const message = input.value;
            if (!message) return;

            box.innerHTML += `<div><b>أنت:</b> ${message}</div>`;
            input.value = '';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await res.json();
                box.innerHTML += `<div><b style="color:#d4af37">شاهين:</b> ${data.response || data.error}</div>`;
                box.scrollTop = box.scrollHeight;
            } catch (e) {
                box.innerHTML += `<div>خطأ في الاتصال</div>`;
            }
        }
    </script>
</body>
</html>
