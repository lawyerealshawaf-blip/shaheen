<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام شاهين الذكي</title>
    <style>
        body { background-color: #001f3f; color: #f5f5f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 600px; text-align: center; border: 2px solid #d4af37; padding: 30px; border-radius: 15px; background: rgba(0,0,0,0.2); }
        h1 { color: #d4af37; margin-bottom: 20px; }
        #chat-box { height: 300px; overflow-y: auto; border: 1px solid #444; padding: 10px; margin-bottom: 20px; text-align: right; border-radius: 8px; background: #002b54; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #d4af37; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: #001f3f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>نظام شاهين الذكي</h1>
        <div id="chat-box"></div>
        <div class="input-group">
            <input type="text" id="user-input" placeholder="اكتب رسالتك هنا...">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const message = input.value;
            if (!message) return;

            box.innerHTML += `<div><b style="color:#fff">أنت:</b> ${message}</div>`;
            input.value = '';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await res.json();
                box.innerHTML += `<div style="margin-top:10px;"><b style="color:#d4af37">شاهين:</b> ${data.response || data.error}</div>`;
                box.scrollTop = box.scrollHeight;
            } catch (e) {
                box.innerHTML += `<div>خطأ في الاتصال</div>`;
            }
        }
    </script>
</body>
</html>
